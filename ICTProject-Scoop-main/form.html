           </div>

   <div class="hero-section d-flex justify-content-start">
    <div class="p-5 text-start texts"> 
        <h1 class="display-5 fw-bold" id="h1"><span class="scoop">SC<span class="first-o">O</span><span class="second-o">O</span>P</span>'s ORDER FORM!</h1> 
    </div>
</div>
</section>

<section>
    <div class="color-text container mt-4 mb-5">
    <div class="row justify-content-center">
    <div class="col-md-6">
    <form id="order-form" action="ty.html">
                
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="bordered form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="bordered form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Delivery Address</label>
                    <textarea class="bordered form-control" rows="2" placeholder="Where should we send the ice cream?" required></textarea>
                </div>

                <div class="mt-3">
                    <label class="form-label fw-bold">Any special toppings or requests?</label>
                    <textarea class="bordered form-control" rows="2" placeholder="e.g. Extra sprinkles, please!"></textarea>
                </div>

                <hr>
                
                <h5 class="mb-3">Payment Info</h5>
                <div class="my-3">
                    <div class="form-check">
                        <input id="credit" name="paymentMethod" type="radio" class="form-check-input" checked required>
                        <label class="form-check-label" for="credit">Credit card</label>
                    </div>
                    <div class="form-check">
                        <input id="paypal" name="paymentMethod" type="radio" class="form-check-input" required>
                        <label class="form-check-label" for="paypal">PayPal</label>
                    </div>
                    <div class="form-check">
                        <input id="stripe" name="paymentMethod" type="radio" class="form-check-input" required>
                        <label class="form-check-label" for="stripe">Stripe</label>
                    </div>
                </div>

                <div class="mb-3">
                    <input type="text" class="bordered form-control" placeholder="Card Number (16 digits)" required>
                </div>

                <button type="submit" class="btn place-order-btn w-100 mt-4 py-2">
                    Place My Order!
                </button>

            </form>
        </div>
    </div>
</div>
</section>


<!--footer-->

            </div>
        </div>
    </div>
</footer>
